services:
  candyai:
    build: .
    container_name: candyai
    restart: unless-stopped
    ports:
      - "8093:80"
    volumes:
      - ./.env:/var/www/html/.env:ro
      - candyai-data:/var/www/html/database
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/html/database/database.sqlite
      LOG_CHANNEL: stderr
    networks:
      - candyai-net

networks:
  candyai-net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.99.0.0/24

volumes:
  candyai-data:
